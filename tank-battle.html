<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>坦克大战 - Tank Battle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', 'Microsoft YaHei', monospace;
            overflow: hidden;
            user-select: none;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 680px;
            color: #e0e0e0;
            font-size: 16px;
        }
        .game-header .left { display: flex; gap: 28px; }
        .game-header span { color: #ff6b35; font-weight: bold; }
        canvas {
            border: 3px solid #444;
            background: #0a0a0a;
            display: block;
            box-shadow: 0 0 30px rgba(255, 107, 53, 0.2);
        }
        .controls-info {
            color: #888;
            font-size: 13px;
            text-align: center;
            line-height: 1.8;
        }
        .controls-info kbd {
            background: #333;
            color: #ff6b35;
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid #555;
            font-family: inherit;
            margin: 0 2px;
        }
        .game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .game-over-overlay.active { display: flex; }
        .game-over-box {
            background: #1a1a2e;
            border: 3px solid #ff6b35;
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
            color: #e0e0e0;
        }
        .game-over-box h1 { font-size: 48px; color: #ff6b35; margin-bottom: 16px; }
        .game-over-box .final-score { font-size: 24px; margin-bottom: 8px; }
        .game-over-box button {
            margin-top: 24px;
            padding: 12px 40px;
            font-size: 20px;
            background: #ff6b35;
            color: #1a1a2e;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }
        .game-over-box button:hover { background: #ff8555; transform: scale(1.05); }
        .game-over-box button:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <div class="left">
                <div>🏆 分数: <span id="score">0</span></div>
                <div>🛡️ 生命: <span id="lives">3</span></div>
            </div>
            <div>📍 关卡: <span id="level">1</span> / <span id="total-levels">5</span></div>
            <div>💥 剩余敌人: <span id="enemies-left">20</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="controls-info">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp;|&nbsp;
            <kbd>空格</kbd> 射击 &nbsp;|&nbsp;
            <kbd>R</kbd> 重新开始
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-box">
            <h1 id="gameOverTitle">GAME OVER</h1>
            <div class="final-score">最终分数: <span id="finalScore">0</span></div>
            <div>到达关卡: <span id="finalLevel">1</span></div>
            <button onclick="restartGame()">🔄 再来一局</button>
        </div>
    </div>

    <script>
    (function() {
        // ============================================================
        //  常量
        // ============================================================
        const TILE_SIZE = 40;
        const COLS = 17;
        const ROWS = 15;
        const W = COLS * TILE_SIZE;   // 680
        const H = ROWS * TILE_SIZE;   // 600

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = W;
        canvas.height = H;

        const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
        const DIR_VEC = [
            { x: 0, y: -1 },  // UP
            { x: 1, y: 0 },   // RIGHT
            { x: 0, y: 1 },   // DOWN
            { x: -1, y: 0 },  // LEFT
        ];
        const TILE = { EMPTY: 0, BRICK: 1, STEEL: 2, WATER: 3, TREE: 4, BASE: 5 };

        // ---- DOM ----
        const $ = (id) => document.getElementById(id);
        const scoreEl = $('score');
        const livesEl = $('lives');
        const levelEl = $('level');
        const totalLevelsEl = $('total-levels');
        const enemiesLeftEl = $('enemies-left');
        const overlay = $('gameOverOverlay');
        const overTitle = $('gameOverTitle');
        const finalScoreEl = $('finalScore');
        const finalLevelEl = $('finalLevel');

        // ---- 游戏状态 ----
        let score, lives, currentLevel;
        const TOTAL_LEVELS = 5;
        let player;
        let enemies = [];
        let bullets = [];
        let particles = [];
        let map = [];
        let spawnTimer = 0;
        let spawnInterval = 100;
        let enemiesSpawned = 0;
        let enemiesDestroyed = 0;
        let totalEnemies = 20;
        let baseAlive = true;
        let gameOver = false;
        let gameWin = false;
        let keys = {};
        let aniId = null;

        // ============================================================
        //  地图生成
        // ============================================================
        function createMap(level) {
            const m = [];
            for (let r = 0; r < ROWS; r++) {
                m[r] = [];
                for (let c = 0; c < COLS; c++) {
                    m[r][c] = TILE.EMPTY;
                }
            }

            // 基地 (底部中央)
            const bx = 8, by = 14;
            m[by][bx] = TILE.BASE;
            m[by][bx+1] = TILE.BASE;
            // 基地围墙
            m[by-1][bx-1] = TILE.BRICK; m[by-1][bx] = TILE.BRICK;
            m[by-1][bx+1] = TILE.BRICK; m[by-1][bx+2] = TILE.BRICK;
            m[by][bx-1] = TILE.BRICK;   m[by][bx+2] = TILE.BRICK;

            if (level === 1) {
                // 简单对称地图
                for (let r = 2; r < 13; r += 3) {
                    for (let c = 0; c < COLS; c++) {
                        if (m[r][c] === TILE.EMPTY && !(c >= 7 && c <= 10 && r >= 12)) {
                            m[r][c] = (c % 4 !== 1) ? TILE.BRICK : TILE.EMPTY;
                        }
                    }
                }
                for (let c = 0; c < COLS; c += 5) {
                    for (let r = 1; r < 12; r++) {
                        if (m[r][c] === TILE.EMPTY) m[r][c] = (r % 2 === 0) ? TILE.STEEL : TILE.EMPTY;
                    }
                }
                // 水域
                m[5][6]=TILE.WATER; m[5][7]=TILE.WATER; m[5][10]=TILE.WATER; m[5][11]=TILE.WATER;
                m[6][7]=TILE.WATER; m[6][10]=TILE.WATER;
            } else if (level === 2) {
                // 迷宫式
                for (let c = 0; c < COLS; c += 2)
                    for (let r = 1; r < 13; r++)
                        if (m[r][c] === TILE.EMPTY && !(c >= 7 && c <= 10 && r >= 12))
                            m[r][c] = (r % 3 === 0) ? TILE.STEEL : TILE.BRICK;
                for (let c = 1; c < COLS; c += 2)
                    for (let r = 2; r < 12; r += 4)
                        if (m[r][c] === TILE.EMPTY) m[r][c] = TILE.BRICK;
                for (let r = 5; r <= 7; r++) { m[r][8] = TILE.WATER; m[r][9] = TILE.WATER; }
            } else if (level === 3) {
                // 十字通道
                for (let c = 0; c < COLS; c++) {
                    if (m[3][c] === TILE.EMPTY) m[3][c] = TILE.BRICK;
                    if (m[9][c] === TILE.EMPTY && !(c >= 7 && c <= 10)) m[9][c] = TILE.BRICK;
                }
                for (let r = 1; r < 13; r++) {
                    if (m[r][4] === TILE.EMPTY) m[r][4] = TILE.STEEL;
                    if (m[r][11] === TILE.EMPTY) m[r][11] = TILE.BRICK;
                }
            } else if (level === 4) {
                // 堡垒
                for (let r = 1; r < 13; r += 2)
                    for (let c = 0; c < COLS; c++)
                        if (m[r][c] === TILE.EMPTY && !(c >= 7 && c <= 10 && r >= 12))
                            m[r][c] = (c % 3 === 0) ? TILE.STEEL : TILE.BRICK;
                for (let c = 6; c <= 11; c++) m[7][c] = TILE.TREE;
            } else if (level === 5) {
                // 终极挑战
                for (let r = 0; r < ROWS - 2; r++)
                    for (let c = 0; c < COLS; c++)
                        if (m[r][c] === TILE.EMPTY && !(c >= 7 && c <= 10 && r >= 12)) {
                            const v = (r + c) % 3;
                            if (v === 0) m[r][c] = TILE.STEEL;
                            else if (v === 1) m[r][c] = TILE.BRICK;
                        }
                for (let r = 2; r < 12; r += 3)
                    for (let c = 0; c < COLS; c += 4)
                        if (!(c >= 7 && c <= 10 && r >= 12)) m[r][c] = TILE.EMPTY;
            }

            // 确保出生区域空旷
            const spawnAreas = [
                { r: 0, c: 3 },   // 玩家出生
                { r: 0, c: 0 },   // 敌人出生点
                { r: 0, c: 8 },
                { r: 0, c: 15 },
            ];
            for (const sa of spawnAreas) {
                for (let dr = 0; dr < 2; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        const rr = sa.r + dr, cc = sa.c + dc;
                        if (rr >= 0 && rr < ROWS && cc >= 0 && cc < COLS && m[rr][cc] !== TILE.BASE) {
                            m[rr][cc] = TILE.EMPTY;
                        }
                    }
                }
            }

            return m;
        }

        // ============================================================
        //  坦克基类
        // ============================================================
        class Tank {
            constructor(cx, cy, dir, color, isPlayer) {
                // cx,cy 是坦克中心像素坐标
                this.cx = cx;
                this.cy = cy;
                this.dir = dir;
                this.color = color;
                this.isPlayer = !!isPlayer;
                this.speed = isPlayer ? 2.5 : 1.2;
                this.size = 18;  // 半边长
                this.alive = true;
                this.reloadTime = isPlayer ? 18 : 55;
                this.reloadCd = 0;
                // AI
                this.aiDirTimer = 0;
                this.aiShootTimer = 30 + Math.floor(Math.random() * 40);
                this.prevCx = cx;
                this.prevCy = cy;
                this.stuckFrames = 0;
            }

            // 获取 AABB
            bbox() {
                return {
                    l: this.cx - this.size,
                    t: this.cy - this.size,
                    r: this.cx + this.size,
                    b: this.cy + this.size,
                };
            }

            // 两个 AABB 是否重叠
            static overlap(a, b) {
                return !(a.r <= b.l || a.l >= b.r || a.b <= b.t || a.t >= b.b);
            }

            // 坦克与地图实心方块碰撞
            collideMap(mx, my) {
                const b = { l: mx - this.size, t: my - this.size, r: mx + this.size, b: my + this.size };
                const sc = Math.floor(b.l / TILE_SIZE);
                const ec = Math.floor((b.r - 0.01) / TILE_SIZE);
                const sr = Math.floor(b.t / TILE_SIZE);
                const er = Math.floor((b.b - 0.01) / TILE_SIZE);
                for (let r = sr; r <= er; r++) {
                    for (let c = sc; c <= ec; c++) {
                        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
                        const t = map[r][c];
                        if (t === TILE.BRICK || t === TILE.STEEL || t === TILE.BASE || t === TILE.WATER) {
                            if (Tank.overlap(b, { l: c*TILE_SIZE, t: r*TILE_SIZE, r: (c+1)*TILE_SIZE, b: (r+1)*TILE_SIZE })) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            // 与其他坦克碰撞
            collideOthers(mx, my) {
                const b = { l: mx - this.size, t: my - this.size, r: mx + this.size, b: my + this.size };
                const all = this.isPlayer ? enemies : enemies.filter(e => e !== this && e.alive);
                if (player && player !== this && player.alive) all.push(player);
                for (const o of all) {
                    if (Tank.overlap(b, o.bbox())) return true;
                }
                return false;
            }

            // 尝试移动：有碰撞则不动，无碰撞则更新位置
            tryMove(dir) {
                this.dir = dir;
                const v = DIR_VEC[dir];
                const nx = this.cx + v.x * this.speed;
                const ny = this.cy + v.y * this.speed;

                // 边界
                const clampedX = Math.max(this.size, Math.min(W - this.size, nx));
                const clampedY = Math.max(this.size, Math.min(H - this.size, ny));

                if (this.collideMap(clampedX, clampedY) || this.collideOthers(clampedX, clampedY)) {
                    return false;
                }
                this.cx = clampedX;
                this.cy = clampedY;
                return true;
            }

            shoot() {
                if (this.reloadCd > 0) return null;
                this.reloadCd = this.reloadTime;
                const v = DIR_VEC[this.dir];
                const bs = this.isPlayer ? 5 : 3.5;
                return new Bullet(
                    this.cx + v.x * (this.size + 4),
                    this.cy + v.y * (this.size + 4),
                    v.x * bs, v.y * bs,
                    this.isPlayer
                );
            }

            update() {
                if (!this.alive) return;
                if (this.reloadCd > 0) this.reloadCd--;
                if (!this.isPlayer) this.ai();
            }

            ai() {
                this.aiDirTimer--;
                this.aiShootTimer--;

                // 卡住检测
                if (Math.abs(this.cx - this.prevCx) < 0.5 && Math.abs(this.cy - this.prevCy) < 0.5) {
                    this.stuckFrames++;
                } else {
                    this.stuckFrames = 0;
                }
                this.prevCx = this.cx;
                this.prevCy = this.cy;

                if (this.stuckFrames > 30) {
                    this.dir = Math.floor(Math.random() * 4);
                    this.stuckFrames = 0;
                    this.aiDirTimer = 15 + Math.floor(Math.random() * 25);
                }

                if (this.aiDirTimer <= 0) {
                    // 概率追踪玩家或基地
                    const rnd = Math.random();
                    if (rnd < 0.4 && player && player.alive) {
                        const dx = player.cx - this.cx, dy = player.cy - this.cy;
                        this.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? DIR.RIGHT : DIR.LEFT) : (dy > 0 ? DIR.DOWN : DIR.UP);
                    } else if (rnd < 0.65) {
                        const dx = (8.5) * TILE_SIZE - this.cx;
                        const dy = 14.5 * TILE_SIZE - this.cy;
                        this.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? DIR.RIGHT : DIR.LEFT) : (dy > 0 ? DIR.DOWN : DIR.UP);
                    } else {
                        this.dir = Math.floor(Math.random() * 4);
                    }
                    this.aiDirTimer = 25 + Math.floor(Math.random() * 45);
                }

                this.tryMove(this.dir);

                if (this.aiShootTimer <= 0) {
                    const b = this.shoot();
                    if (b) bullets.push(b);
                    this.aiShootTimer = 35 + Math.floor(Math.random() * 55);
                }
            }

            hit() {
                this.alive = false;
                const n = this.isPlayer ? 20 : 12;
                for (let i = 0; i < n; i++) {
                    particles.push(new Particle(this.cx, this.cy, this.color, this.isPlayer ? 4 : 2.5));
                }
            }

            draw() {
                if (!this.alive) return;
                ctx.save();
                ctx.translate(this.cx, this.cy);
                ctx.rotate(this.dir * Math.PI / 2);

                const s = this.size;
                // 履带
                ctx.fillStyle = '#2a2a2a';
                ctx.fillRect(-s, -s, s * 0.32, s * 2);
                ctx.fillRect(s * 0.68, -s, s * 0.32, s * 2);
                for (let i = -3; i <= 3; i++) {
                    ctx.fillStyle = '#444';
                    ctx.fillRect(-s, i * (s / 3.5) - 1.5, s * 0.32, 3);
                    ctx.fillRect(s * 0.68, i * (s / 3.5) - 1.5, s * 0.32, 3);
                }
                // 车身
                const grad = ctx.createLinearGradient(0, -s, 0, s);
                grad.addColorStop(0, this.lighten(this.color, 0.15));
                grad.addColorStop(1, this.darken(this.color, 0.3));
                ctx.fillStyle = grad;
                ctx.fillRect(-s * 0.55, -s * 0.8, s * 1.1, s * 1.6);
                // 炮塔
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(0, 0, s * 0.42, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // 炮管
                ctx.fillStyle = this.lighten(this.color, 0.25);
                ctx.fillRect(-2.5, -s * 0.85, 5, s * 0.6);
                ctx.fillStyle = '#e8e8e8';
                ctx.fillRect(-1.2, -s * 0.85, 2.4, s * 0.45);
                ctx.fillStyle = '#fff';
                ctx.fillRect(-3.5, -s * 0.88, 7, 4);
                ctx.strokeStyle = '#222';
                ctx.lineWidth = 1;
                ctx.strokeRect(-3.5, -s * 0.88, 7, 4);

                ctx.restore();
            }

            darken(hex, f) {
                const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                const m = 1 - f;
                return `rgb(${Math.floor(r*m)},${Math.floor(g*m)},${Math.floor(b*m)})`;
            }
            lighten(hex, f) {
                const r = Math.min(255, parseInt(hex.slice(1,3),16) + f*255);
                const g = Math.min(255, parseInt(hex.slice(3,5),16) + f*255);
                const b = Math.min(255, parseInt(hex.slice(5,7),16) + f*255);
                return `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
            }
        }

        // ============================================================
        //  子弹
        // ============================================================
        class Bullet {
            constructor(x, y, vx, vy, isPlayer) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.isPlayer = isPlayer;
                this.r = 3;
                this.alive = true;
            }

            bbox() { return { l: this.x - this.r, t: this.y - this.r, r: this.x + this.r, b: this.y + this.r }; }

            update() {
                if (!this.alive) return;
                this.x += this.vx;
                this.y += this.vy;

                if (this.x < -10 || this.x > W + 10 || this.y < -10 || this.y > H + 10) {
                    this.alive = false; return;
                }

                // 地图碰撞
                const col = Math.floor(this.x / TILE_SIZE);
                const row = Math.floor(this.y / TILE_SIZE);
                if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
                    const t = map[row][col];
                    if (t === TILE.BRICK) {
                        map[row][col] = TILE.EMPTY;
                        this.alive = false;
                        for (let i = 0; i < 4; i++) particles.push(new Particle(col*TILE_SIZE+TILE_SIZE/2, row*TILE_SIZE+TILE_SIZE/2, '#c67a3a', 2));
                        return;
                    }
                    if (t === TILE.STEEL) {
                        this.alive = false;
                        for (let i = 0; i < 3; i++) particles.push(new Particle(this.x, this.y, '#ccc', 1.5));
                        return;
                    }
                    if (t === TILE.BASE) {
                        map[row][col] = TILE.EMPTY;
                        this.alive = false;
                        baseAlive = false;
                        for (let i = 0; i < 30; i++) particles.push(new Particle(col*TILE_SIZE+TILE_SIZE/2, row*TILE_SIZE+TILE_SIZE/2, '#ff2222', 5));
                        return;
                    }
                }

                const bb = this.bbox();
                if (this.isPlayer) {
                    for (const e of enemies) {
                        if (!e.alive) continue;
                        if (Tank.overlap(bb, e.bbox())) {
                            this.alive = false;
                            e.hit();
                            if (!e.alive) { enemiesDestroyed++; score += 100; refreshUI(); }
                            return;
                        }
                    }
                    // 抵消敌人子弹
                    for (const b of bullets) {
                        if (b === this || !b.alive || b.isPlayer) continue;
                        if (Tank.overlap(bb, b.bbox())) {
                            this.alive = false; b.alive = false; return;
                        }
                    }
                } else {
                    if (player && player.alive && Tank.overlap(bb, player.bbox())) {
                        this.alive = false;
                        playerHit();
                        return;
                    }
                }
            }

            draw() {
                if (!this.alive) return;
                ctx.fillStyle = this.isPlayer ? '#ffeb3b' : '#ff5252';
                ctx.shadowColor = this.isPlayer ? '#ffeb3b' : '#ff5252';
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ============================================================
        //  粒子
        // ============================================================
        class Particle {
            constructor(x, y, color, size) {
                this.x = x; this.y = y; this.color = color; this.size = size || 2.5;
                const a = Math.random() * Math.PI * 2, sp = 1 + Math.random() * 2.5;
                this.vx = Math.cos(a) * sp; this.vy = Math.sin(a) * sp;
                this.life = 18 + Math.floor(Math.random() * 18);
                this.max = this.life;
                this.alive = true;
            }
            update() {
                this.life--;
                if (this.life <= 0) { this.alive = false; return; }
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.94; this.vy *= 0.94;
            }
            draw() {
                if (!this.alive) return;
                const a = this.life / this.max;
                ctx.globalAlpha = a;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // ============================================================
        //  游戏逻辑
        // ============================================================
        function playerHit() {
            lives--;
            refreshUI();
            for (let i = 0; i < 22; i++) particles.push(new Particle(player.cx, player.cy, player.color, 3.5));
            if (lives <= 0) {
                player.alive = false;
                endGame(false);
            } else {
                respawnPlayer();
            }
        }

        function respawnPlayer() {
            player.cx = 3.5 * TILE_SIZE;
            player.cy = TILE_SIZE / 2;
            player.dir = DIR.DOWN;
            player.alive = true;
            player.reloadCd = 0;
            // 确保安全
            if (player.collideMap(player.cx, player.cy) || player.collideOthers(player.cx, player.cy)) {
                // 尝试其他位置
                const tries = [
                    [0.5, 0.5], [8.5, 0.5], [15.5, 0.5],
                    [0.5, 0.5], [8.5, 0.5], [15.5, 0.5],
                ];
                for (const [tc, tr] of tries) {
                    const tx = tc * TILE_SIZE, ty = tr * TILE_SIZE;
                    if (!player.collideMap(tx, ty) && !player.collideOthers(tx, ty)) {
                        player.cx = tx; player.cy = ty; break;
                    }
                }
            }
        }

        function spawnEnemy() {
            if (enemiesSpawned >= totalEnemies) return;
            const types = [
                { color: '#e74c3c', speed: 1.2, reload: 55 },
                { color: '#f39c12', speed: 1.8, reload: 40 },
                { color: '#9b59b6', speed: 1.0, reload: 30 },
            ];
            let ti = 0;
            const r = Math.random();
            if (currentLevel >= 4) ti = r < 0.3 ? 0 : (r < 0.65 ? 1 : 2);
            else if (currentLevel >= 3) ti = r < 0.5 ? 0 : (r < 0.8 ? 1 : 2);
            else if (currentLevel >= 2) ti = r < 0.7 ? 0 : 1;
            else ti = 0;
            const t = types[ti];

            const spawnCols = [0, 8, 15];
            const col = spawnCols[Math.floor(Math.random() * spawnCols.length)];
            const e = new Tank(col * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE / 2, DIR.DOWN, t.color, false);
            e.speed = t.speed;
            e.reloadTime = t.reload;
            if (e.collideMap(e.cx, e.cy) || e.collideOthers(e.cx, e.cy)) {
                for (const sc of spawnCols) {
                    e.cx = sc * TILE_SIZE + TILE_SIZE / 2;
                    e.cy = TILE_SIZE / 2;
                    if (!e.collideMap(e.cx, e.cy) && !e.collideOthers(e.cx, e.cy)) break;
                }
            }
            enemies.push(e);
            enemiesSpawned++;
            refreshUI();
        }

        function endGame(won) {
            gameOver = true; gameWin = won;
            overlay.classList.add('active');
            overTitle.textContent = won ? '🎉 胜利！' : '💀 GAME OVER';
            overTitle.style.color = won ? '#2ecc71' : '#ff6b35';
            finalScoreEl.textContent = score;
            finalLevelEl.textContent = currentLevel;
        }

        function nextLevel() {
            if (currentLevel >= TOTAL_LEVELS) { endGame(true); return; }
            currentLevel++;
            setupLevel();
            refreshUI();
        }

        function refreshUI() {
            scoreEl.textContent = score;
            livesEl.textContent = lives;
            levelEl.textContent = currentLevel;
            totalLevelsEl.textContent = TOTAL_LEVELS;
            enemiesLeftEl.textContent = Math.max(0, totalEnemies - enemiesDestroyed);
        }

        function setupLevel() {
            map = createMap(currentLevel);
            totalEnemies = 16 + currentLevel * 2;
            enemies = [];
            bullets = [];
            particles = [];
            enemiesSpawned = 0;
            enemiesDestroyed = 0;
            spawnTimer = 0;
            spawnInterval = Math.max(40, 110 - currentLevel * 12);
            baseAlive = true;
            gameOver = false;
            gameWin = false;

            if (!player) {
                player = new Tank(3.5 * TILE_SIZE, TILE_SIZE / 2, DIR.DOWN, '#2ecc71', true);
            }
            respawnPlayer();
            overlay.classList.remove('active');
            refreshUI();
        }

        window.restartGame = function() {
            score = 0;
            lives = 3;
            currentLevel = 1;
            player = new Tank(3.5 * TILE_SIZE, TILE_SIZE / 2, DIR.DOWN, '#2ecc71', true);
            setupLevel();
        };

        // ============================================================
        //  输入
        // ============================================================
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
            if (e.code === 'KeyR') window.restartGame();
        });
        window.addEventListener('keyup', e => { keys[e.code] = false; });

        function handleInput() {
            if (!player || !player.alive || gameOver) return;
            const pressed = [];
            if (keys['ArrowUp'] || keys['KeyW']) pressed.push(DIR.UP);
            if (keys['ArrowDown'] || keys['KeyS']) pressed.push(DIR.DOWN);
            if (keys['ArrowLeft'] || keys['KeyA']) pressed.push(DIR.LEFT);
            if (keys['ArrowRight'] || keys['KeyD']) pressed.push(DIR.RIGHT);

            // 取最后一个按下的方向（模拟优先）
            if (pressed.length > 0) {
                player.tryMove(pressed[pressed.length - 1]);
            }
            if (keys['Space']) {
                const b = player.shoot();
                if (b) bullets.push(b);
            }
        }

        // 触摸支持
        let touchDir = null;
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0];
            canvas._tx = t.clientX; canvas._ty = t.clientY;
            keys['Space'] = true;
        }, { passive: false });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            const dx = t.clientX - canvas._tx, dy = t.clientY - canvas._ty;
            const th = 12;
            if (Math.abs(dx) < th && Math.abs(dy) < th) { touchDir = null; return; }
            if (Math.abs(dx) > Math.abs(dy)) touchDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
            else touchDir = dy > 0 ? DIR.DOWN : DIR.UP;
        }, { passive: false });
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            keys['Space'] = false;
            touchDir = null;
        }, { passive: false });

        function handleTouchInput() {
            if (!player || !player.alive || gameOver || touchDir === null) return;
            player.tryMove(touchDir);
        }

        // ============================================================
        //  渲染
        // ============================================================
        function drawMap() {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const x = c * TILE_SIZE, y = r * TILE_SIZE;
                    switch (map[r][c]) {
                        case TILE.BRICK:
                            ctx.fillStyle = '#b87333';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#8b4513';
                            ctx.fillRect(x, y + TILE_SIZE/2 - 1, TILE_SIZE, 2);
                            ctx.fillRect(x + TILE_SIZE/2 - 1, y, 2, TILE_SIZE/2);
                            ctx.fillRect(x + TILE_SIZE/4 - 1, y + TILE_SIZE/2, 2, TILE_SIZE/2);
                            ctx.fillRect(x + 3*TILE_SIZE/4 - 1, y + TILE_SIZE/2, 2, TILE_SIZE/2);
                            ctx.strokeStyle = '#d4956a'; ctx.lineWidth = 1;
                            ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
                            break;
                        case TILE.STEEL:
                            ctx.fillStyle = '#888';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#aaa';
                            ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                            ctx.fillStyle = '#555';
                            [[x+5,y+5],[x+TILE_SIZE-9,y+5],[x+5,y+TILE_SIZE-9],[x+TILE_SIZE-9,y+TILE_SIZE-9]].forEach(([rx,ry]) => {
                                ctx.beginPath(); ctx.arc(rx+2, ry+2, 2, 0, Math.PI*2); ctx.fill();
                            });
                            ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1;
                            ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                            break;
                        case TILE.WATER:
                            ctx.fillStyle = '#1a6b8a';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = 'rgba(255,255,255,0.25)';
                            const wo = (Date.now()/500 + c + r) % (Math.PI*2);
                            for (let wy = 0; wy < 3; wy++)
                                ctx.fillRect(x + 4 + Math.sin(wo + wy)*5, y + 8 + wy*12, TILE_SIZE-12, 2);
                            break;
                        case TILE.TREE:
                            ctx.fillStyle = '#1a3a1a';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            break;
                        case TILE.BASE:
                            ctx.fillStyle = '#1a1a2e';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            ctx.fillStyle = '#ffd700';
                            ctx.beginPath();
                            ctx.ellipse(x + TILE_SIZE/2, y + TILE_SIZE/2 + 4, TILE_SIZE/3, TILE_SIZE/2.5, 0, 0, Math.PI*2);
                            ctx.fill();
                            ctx.beginPath();
                            ctx.moveTo(x + 6, y + TILE_SIZE/2);
                            ctx.quadraticCurveTo(x + TILE_SIZE/2, y + 2, x + TILE_SIZE - 6, y + TILE_SIZE/2);
                            ctx.fillStyle = '#ffed4a'; ctx.fill();
                            ctx.fillStyle = '#fff';
                            ctx.beginPath(); ctx.arc(x + TILE_SIZE/2, y + TILE_SIZE/2 - 2, 6, 0, Math.PI*2); ctx.fill();
                            ctx.fillStyle = '#ffd700';
                            ctx.beginPath(); ctx.arc(x + TILE_SIZE/2, y + TILE_SIZE/2 - 3, 4, 0, Math.PI*2); ctx.fill();
                            break;
                        default:
                            ctx.fillStyle = '#0a0a0a';
                            ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                            ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
                            ctx.strokeRect(x, y, TILE_SIZE, TILE_SIZE);
                    }
                }
            }
        }

        function drawTrees() {
            // 树冠绘制在上层（遮挡坦克）
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (map[r][c] !== TILE.TREE) continue;
                    const x = c * TILE_SIZE, y = r * TILE_SIZE;
                    ctx.fillStyle = '#2d5a27';
                    ctx.beginPath(); ctx.arc(x + TILE_SIZE/2, y + TILE_SIZE/2, TILE_SIZE/2 - 2, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#3a7a34';
                    ctx.beginPath(); ctx.arc(x + TILE_SIZE/2 - 3, y + TILE_SIZE/2 - 4, TILE_SIZE/2 - 6, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#4a9a44';
                    ctx.beginPath(); ctx.arc(x + TILE_SIZE/2 + 2, y + TILE_SIZE/2 + 2, TILE_SIZE/2 - 7, 0, Math.PI*2); ctx.fill();
                }
            }
        }

        function render() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, W, H);
            drawMap();
            // 子弹
            for (const b of bullets) b.draw();
            // 坦克
            for (const e of enemies) e.draw();
            if (player && player.alive) {
                player.draw();
                // 玩家光环
                ctx.strokeStyle = 'rgba(46, 204, 113, 0.35)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(player.cx, player.cy, player.size + 3, 0, Math.PI*2);
                ctx.stroke();
            }
            // 树冠（遮罩层）
            drawTrees();
            // 粒子
            for (const p of particles) p.draw();
        }

        // ============================================================
        //  游戏循环
        // ============================================================
        function update() {
            if (gameOver) return;
            if (!baseAlive && !gameOver) { endGame(false); return; }

            handleInput();
            handleTouchInput();

            if (player && player.alive) player.update();

            // 敌人生成
            if (enemiesSpawned < totalEnemies) {
                const aliveCount = enemies.filter(e => e.alive).length;
                spawnTimer++;
                if (spawnTimer >= spawnInterval && aliveCount < 6) {
                    spawnTimer = 0;
                    spawnEnemy();
                }
            }

            for (const e of enemies) e.update();
            for (const b of bullets) b.update();
            for (const p of particles) p.update();

            // 清理
            bullets = bullets.filter(b => b.alive);
            enemies = enemies.filter(e => e.alive);
            particles = particles.filter(p => p.alive);

            // 胜利条件
            if (enemiesDestroyed >= totalEnemies && !gameOver) {
                nextLevel();
            }

            refreshUI();
        }

        function loop() {
            update();
            render();
            aniId = requestAnimationFrame(loop);
        }

        // ============================================================
        //  启动
        // ============================================================
        score = 0;
        lives = 3;
        currentLevel = 1;
        player = new Tank(3.5 * TILE_SIZE, TILE_SIZE / 2, DIR.DOWN, '#2ecc71', true);
        setupLevel();
        loop();

        console.log('🎮 坦克大战已就绪！');
        console.log('  ↑↓←→ / WASD 移动 | 空格 射击 | R 重新开始');
    })();
    </script>
